<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Thunder Mule Coffee</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0a0a0a;
      color: #a855f7;
      text-align: center;
      padding: 100px 20px;
      line-height: 1.6;
    }
    h1 {
      font-size: 3.5rem;
      margin-bottom: 20px;
      text-shadow: 0 0 30px #a855f7;
    }
    p {
      font-size: 1.3rem;
      max-width: 700px;
      margin: 0 auto 40px;
    }
    .back-btn {
      background: linear-gradient(135deg, #a855f7, #7e22ce);
      color: white;
      padding: 18px 40px;
      font-size: 1.3rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h1>Thank You!</h1>
  <p>Your Thunder Mule Coffee order has been received.<br>
  We are packing it fresh in Chiang Mai and will ship it soon.</p>
  <p>You will receive a confirmation email shortly.</p>
  
  <a href="https://thundermulecoffee.com" class="back-btn">Back to Home</a>

</html>
